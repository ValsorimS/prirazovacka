<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#fdf6ec">
<title>Přiřazovačka</title>
<style>
:root{
  --bg:#fdf6ec; --card:#ffffff; --ink:#3b3245; --muted:#8a7f99;
  --accent:#ff8a3d; --accent2:#7c5cff; --good:#2fb56b; --bad:#e5534b;
  --radius:20px; --shadow:0 4px 14px rgba(60,40,90,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg); color:var(--ink);
  overscroll-behavior:none; touch-action:manipulation;
  -webkit-user-select:none; user-select:none;
}
input,textarea,select{-webkit-user-select:text;user-select:text}
button{font:inherit;border:0;background:none;color:inherit;cursor:pointer;padding:0}
h1,h2,h3{margin:0}
.screen{display:none}
.screen.active{display:flex;flex-direction:column;min-height:100dvh}

/* ---------- buttons & forms ---------- */
.btn{border-radius:14px;padding:10px 16px;font-weight:700;font-size:16px;white-space:nowrap}
.btn:active{transform:scale(.96)}
.btn-play{background:linear-gradient(135deg,#ff8a3d,#ff5f6d);color:#fff;font-size:19px;padding:13px 26px;border-radius:16px;box-shadow:0 6px 16px rgba(255,110,60,.35)}
.btn-ghost{background:var(--card);box-shadow:var(--shadow)}
.btn-sm{background:#efe9f7;padding:9px 13px;border-radius:12px;font-size:15px;display:inline-flex;align-items:center;gap:6px}
.btn-save{background:var(--good);color:#fff}
.btn-new{background:var(--accent2);color:#fff;margin-bottom:18px}
.danger{color:#c0392b}
input[type=text],input:not([type]),textarea,select{
  width:100%;padding:11px 13px;border:2px solid #e6dff0;border-radius:12px;
  font-size:16px;background:#fff;color:var(--ink);font-family:inherit
}
label{display:block;font-weight:700;font-size:14px;color:var(--muted);margin-bottom:12px}
label input,label .row{margin-top:6px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.row.center{justify-content:center}
.hint{font-weight:400;font-size:13px;color:var(--muted)}
.empty{color:var(--muted)}

/* ---------- home ---------- */
.home-wrap{max-width:1000px;margin:0 auto;padding:26px 22px calc(26px + env(safe-area-inset-bottom));width:100%}
.home-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.home-head h1{font-size:32px}
.sub{margin:6px 0 0;color:var(--muted)}
.sc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.sc-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px}
.sc-name{font-size:20px;font-weight:800}
.sc-meta{font-size:14px;color:var(--muted)}
.sc-tools{display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid #f0eaf6;padding-top:12px}
.hold-btn{position:relative;overflow:hidden}
.hold-fill{position:absolute;left:0;top:0;bottom:0;width:0;background:rgba(255,138,61,.35)}
.hold-label{position:relative}

/* ---------- zones (shared editor + game) ---------- */
.zone{
  position:absolute;border:3px dashed rgba(255,255,255,.9);
  background:rgba(255,255,255,.22);border-radius:18px;
}
.zone .z-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:clamp(36px,7vw,84px);opacity:.4;pointer-events:none}
.zone .z-label{position:absolute;top:6px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.92);padding:3px 12px;border-radius:999px;
  font-weight:800;font-size:14px;white-space:nowrap;max-width:92%;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
.zone.hot{background:rgba(255,255,255,.5);border-color:#fff;box-shadow:0 0 0 4px rgba(255,255,255,.4)}
.zone.sel{border-style:solid;border-color:var(--accent2)}
.z-handle{position:absolute;right:-8px;bottom:-8px;width:36px;height:36px;border-radius:50%;
  background:var(--accent2);border:3px solid #fff;touch-action:none;box-shadow:var(--shadow)}

/* ---------- game ---------- */
#scr-game{background:var(--bg)}
.g-top{display:flex;align-items:center;gap:12px;padding:12px 16px calc(0px);padding-top:calc(12px + env(safe-area-inset-top))}
.g-instr{flex:1;font-size:clamp(16px,2.6vw,24px);font-weight:800;line-height:1.25}
.btn-say{background:var(--card);box-shadow:var(--shadow);width:46px;height:46px;border-radius:50%;font-size:20px;flex:none}
.g-stage{position:relative;flex:1;margin:10px 16px 0;border-radius:20px;overflow:hidden;touch-action:none;box-shadow:var(--shadow)}
.g-tray{display:flex;gap:12px;padding:14px 16px calc(14px + env(safe-area-inset-bottom));overflow-x:auto;align-items:center;min-height:130px}
.tray-item{width:98px;height:98px;flex:none;background:#fff;border-radius:18px;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;touch-action:none;overflow:hidden}
.tray-item .emo{font-size:58px;pointer-events:none}
.tray-item img{width:100%;height:100%;object-fit:contain;pointer-events:none}
.tray-item.gone{visibility:hidden}
.tray-item.shake{animation:shake .45s}
@keyframes shake{20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.drag-ghost{position:fixed;z-index:50;width:110px;height:110px;pointer-events:none;
  display:flex;align-items:center;justify-content:center;background:#fff;border-radius:20px;
  box-shadow:0 14px 30px rgba(0,0,0,.28);overflow:hidden}
.drag-ghost .emo{font-size:66px}
.drag-ghost img{width:94%;height:94%;object-fit:contain}
.placed{position:absolute;display:flex;align-items:center;justify-content:center;pointer-events:none}
.placed .emo{font-size:inherit}
.placed img{width:100%;height:100%;object-fit:contain;background:rgba(255,255,255,.9);border-radius:12px}
.spark{position:fixed;z-index:60;pointer-events:none;font-size:22px;animation:spark .7s ease-out forwards}
@keyframes spark{to{transform:translate(var(--dx),var(--dy)) scale(.3);opacity:0}}
.g-over{position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;background:rgba(40,25,60,.4)}
.g-over.show{display:flex}
.win-card{background:#fff;border-radius:26px;padding:34px 44px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3);position:relative;z-index:2}
.win-emo{font-size:64px}
.win-card h2{font-size:34px;margin:8px 0}
.win-stars{font-size:36px;margin-bottom:20px}
.win-stars .dim{opacity:.25;filter:grayscale(1)}
.conf{position:absolute;top:-40px;font-size:26px;animation:fall 2.4s linear forwards;pointer-events:none}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.6}}

/* ---------- editor ---------- */
.ed-wrap{max-width:820px;margin:0 auto;padding:20px 20px calc(40px + env(safe-area-inset-bottom));width:100%}
.ed-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ed-head h2{font-size:22px}
.ed-head .spacer{flex:1}
.ed-sec{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
.ed-sec h3{margin-bottom:12px;font-size:17px}
.bg-row{display:flex;gap:10px;flex-wrap:wrap}
.bg-swatch{width:110px;height:76px;border-radius:14px;border:3px solid transparent;position:relative;overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;font-size:13px;font-weight:700}
.bg-swatch span{background:rgba(255,255,255,.85);border-radius:8px;padding:1px 8px;margin-bottom:6px}
.bg-swatch.sel{border-color:var(--accent2)}
.bg-upload{background:#efe9f7;flex-direction:column;align-items:center;justify-content:center;font-size:22px;gap:2px;cursor:pointer;margin:0}
#ed-stage{position:relative;width:min(100%,720px);aspect-ratio:4/3;border-radius:16px;overflow:hidden;touch-action:none;margin-top:12px}
.stage-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.95);
  font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.35)}
.zone-panel{margin-top:14px;padding-top:14px;border-top:1px solid #f0eaf6;display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end}
.zone-panel label{margin-bottom:0}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:14px}
.item-card{background:#faf7ff;border:1px solid #efe9f7;border-radius:16px;padding:10px;position:relative;display:flex;flex-direction:column;gap:8px}
.item-vis{height:86px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.item-vis .emo{font-size:56px}
.item-vis img{max-width:100%;max-height:100%;object-fit:contain;border-radius:10px}
.item-card select{font-size:14px;padding:8px}
.item-del{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;background:#fff;
  box-shadow:var(--shadow);font-size:13px;color:var(--bad);font-weight:800}
#ed-emoji,#ed-pict{width:200px;flex:1;min-width:140px}
.pict-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:10px;margin-top:10px}
.pict-thumb{background:#fff;border:1px solid #efe9f7;border-radius:12px;padding:6px;cursor:pointer}
.pict-thumb:active{transform:scale(.94)}
.pict-thumb img{width:100%;display:block}

/* ---------- results ---------- */
.res-card{background:var(--card);border-radius:16px;padding:14px 18px;box-shadow:var(--shadow);margin-bottom:10px;
  display:grid;grid-template-columns:auto 1fr auto;gap:4px 16px;align-items:center}
.res-when{color:var(--muted);font-size:14px;white-space:nowrap}
.res-name{font-weight:800}
.res-stars{font-size:18px;white-space:nowrap}
.res-info{grid-column:2/4;font-size:14px;color:var(--muted)}
@media (max-width:600px){.zone-panel{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="scr-home" class="screen"></div>
<div id="scr-editor" class="screen"></div>
<div id="scr-game" class="screen"></div>
<div id="scr-results" class="screen"></div>

<script>
'use strict';
/* ================= utility ================= */
const $=s=>document.querySelector(s);
const uid=()=>Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
document.addEventListener('dblclick',e=>e.preventDefault());

async function fileToDataURL(file,maxDim){
  const url=URL.createObjectURL(file);
  try{
    const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=url;});
    const s=Math.min(1,maxDim/Math.max(img.width,img.height));
    const c=document.createElement('canvas');
    c.width=Math.round(img.width*s); c.height=Math.round(img.height*s);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    return c.toDataURL('image/jpeg',0.85);
  }finally{URL.revokeObjectURL(url);}
}

/* ================= storage (IndexedDB) ================= */
const DB={
  _db:null,
  open(){return new Promise((res,rej)=>{
    const r=indexedDB.open('prirazovacka',2);
    r.onupgradeneeded=()=>{
      const db=r.result;
      if(!db.objectStoreNames.contains('scenarios'))db.createObjectStore('scenarios',{keyPath:'id'});
      if(!db.objectStoreNames.contains('results'))db.createObjectStore('results',{keyPath:'id'});
    };
    r.onsuccess=()=>{DB._db=r.result;res();};
    r.onerror=()=>rej(r.error);
  });},
  store(name,mode){return DB._db.transaction(name,mode).objectStore(name);},
  getAll(name){return new Promise((res,rej)=>{const q=DB.store(name,'readonly').getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>rej(q.error);});},
  put(name,s){return new Promise((res,rej)=>{const q=DB.store(name,'readwrite').put(s);q.onsuccess=()=>res();q.onerror=()=>rej(q.error);});},
  del(name,id){return new Promise((res,rej)=>{const q=DB.store(name,'readwrite').delete(id);q.onsuccess=()=>res();q.onerror=()=>rej(q.error);});},
  clear(name){return new Promise((res,rej)=>{const q=DB.store(name,'readwrite').clear();q.onsuccess=()=>res();q.onerror=()=>rej(q.error);});},
};

/* ================= sound & speech ================= */
let AC=null;
function ac(){
  if(!AC){const C=window.AudioContext||window.webkitAudioContext;if(C)AC=new C();}
  if(AC&&AC.state==='suspended')AC.resume();
  return AC;
}
function tone(freq,when,dur,type='triangle',vol=.18){
  const a=ac(); if(!a)return;
  const t=a.currentTime+when,o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+.02);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g).connect(a.destination);o.start(t);o.stop(t+dur+.05);
}
const sndGood=()=>{tone(660,0,.15);tone(880,.12,.22);};
const sndBad =()=>tone(220,0,.28,'sine',.12);
const sndWin =()=>[523,659,784,1047].forEach((f,i)=>tone(f,i*.13,.22));
function speak(t){
  if(!t||!('speechSynthesis' in window))return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t);
    u.lang='cs-CZ';u.rate=.95;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ================= backgrounds ================= */
const BG_PRESETS=[
  {id:'kitchen',name:'Kuchyně',css:'linear-gradient(180deg,#fff3dd 0%,#ffe4b5 54%,#c98a4b 54.5%,#8f5a2b 100%)'},
  {id:'meadow', name:'Louka',  css:'linear-gradient(180deg,#a8e0ff 0%,#dff6ff 44%,#93d16c 44.5%,#5daf3f 100%)'},
  {id:'room',   name:'Pokoj',  css:'linear-gradient(180deg,#f6ecff 0%,#e7d9fb 58%,#d6b088 58.5%,#a9834f 100%)'},
  {id:'plain',  name:'Klidné', css:'linear-gradient(180deg,#dfeefa,#c4dcef)'},
];
function bgStyle(bg){
  if(bg&&bg.type==='photo')return `background:#ddd url("${bg.value}") center/cover no-repeat;`;
  const p=BG_PRESETS.find(p=>p.id===(bg&&bg.value))||BG_PRESETS[3];
  return `background:${p.css};`;
}
function posZone(el,z){el.style.left=z.x*100+'%';el.style.top=z.y*100+'%';el.style.width=z.w*100+'%';el.style.height=z.h*100+'%';}
function itemVis(it){return it.type==='emoji'?`<span class="emo">${it.value}</span>`:`<img src="${it.value}" draggable="false" alt="">`;}

/* ================= state ================= */
const state={scenarios:[],teacher:false,draft:null,selZone:null,game:null,gameReturn:'home'};
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));window.scrollTo(0,0);}

/* ================= home ================= */
function renderHome(){
  const el=$('#scr-home');
  state.scenarios.sort((a,b)=>(a.created||0)-(b.created||0));
  const cards=state.scenarios.map(sc=>`
    <div class="sc-card">
      <div class="sc-name">${esc(sc.name)}</div>
      <div class="sc-meta">${sc.zones.length}× cíl · ${sc.items.length} obrázků</div>
      <button class="btn btn-play" data-play="${sc.id}">▶ Hrát</button>
      ${state.teacher?`<div class="sc-tools">
        <button class="btn btn-sm" data-edit="${sc.id}">✏️ Upravit</button>
        <button class="btn btn-sm" data-copy="${sc.id}">📄 Kopie</button>
        <button class="btn btn-sm" data-exp="${sc.id}">📤 Export</button>
        <button class="btn btn-sm danger" data-del="${sc.id}">🗑 Smazat</button>
      </div>`:''}
    </div>`).join('');
  el.innerHTML=`<div class="home-wrap">
    <header class="home-head">
      <div><h1>🧩 Přiřazovačka</h1><p class="sub">Vyber si úkol a přetahuj obrázky prstem.</p></div>
      ${state.teacher
        ?`<div class="row">
            <button class="btn btn-ghost" id="btn-results">📊 Výsledky</button>
            <button class="btn btn-ghost" id="btn-teacher-off">✕ Zavřít režim učitele</button>
          </div>`
        :`<button class="btn btn-ghost hold-btn" id="btn-teacher"><span class="hold-fill"></span><span class="hold-label">🔧 Pro učitele (podržet)</span></button>`}
    </header>
    ${state.teacher?`<div class="row" style="margin-bottom:18px">
      <button class="btn btn-new" style="margin-bottom:0" id="btn-new">＋ Nový scénář</button>
      <button class="btn btn-sm" id="btn-import">📥 Nahrát scénář ze souboru</button>
      <input type="file" id="imp-file" accept=".json,application/json" hidden>
    </div>`:''}
    <div class="sc-grid">${cards||'<p class="empty">Zatím tu nejsou žádné scénáře. Zapni režim učitele a vytvoř první.</p>'}</div>
  </div>`;

  el.querySelectorAll('[data-play]').forEach(b=>b.onclick=()=>{
    const sc=state.scenarios.find(s=>s.id===b.dataset.play);
    if(sc)startGame(sc,'home');
  });
  el.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openEditor(state.scenarios.find(s=>s.id===b.dataset.edit)));
  el.querySelectorAll('[data-copy]').forEach(b=>b.onclick=async()=>{
    const src=state.scenarios.find(s=>s.id===b.dataset.copy);
    const cp=JSON.parse(JSON.stringify(src));
    cp.id=uid();cp.name=src.name+' (kopie)';cp.created=Date.now();
    await DB.put('scenarios',cp);state.scenarios.push(cp);renderHome();
  });
  el.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
    const sc=state.scenarios.find(s=>s.id===b.dataset.del);
    if(!confirm(`Opravdu smazat „${sc.name}“?`))return;
    await DB.del('scenarios',sc.id);state.scenarios=state.scenarios.filter(s=>s.id!==sc.id);renderHome();
  });
  el.querySelectorAll('[data-exp]').forEach(b=>b.onclick=()=>exportScenario(state.scenarios.find(s=>s.id===b.dataset.exp)));
  const off=$('#btn-teacher-off');
  if(off)off.onclick=()=>{state.teacher=false;renderHome();};
  const hold=$('#btn-teacher');
  if(hold)wireHold(hold,()=>{state.teacher=true;renderHome();});
  const nw=$('#btn-new');
  if(nw)nw.onclick=()=>openEditor(null);
  const resBtn=$('#btn-results');
  if(resBtn)resBtn.onclick=renderResults;
  const impBtn=$('#btn-import');
  if(impBtn){
    const inp=$('#imp-file');
    impBtn.onclick=()=>inp.click();
    inp.onchange=async e=>{
      const f=e.target.files[0];e.target.value='';if(!f)return;
      try{
        const sc=JSON.parse(await f.text());
        if(!Array.isArray(sc.zones)||!Array.isArray(sc.items))throw new Error('bad format');
        sc.id=uid();sc.created=Date.now();
        await DB.put('scenarios',sc);
        state.scenarios.push(sc);
        renderHome();
      }catch(err){alert('Tento soubor se nepodařilo načíst — je to exportovaný scénář Přiřazovačky?');}
    };
  }
}
function exportScenario(sc){
  const blob=new Blob([JSON.stringify(sc)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(sc.name||'scenar').trim().replace(/\s+/g,'-')+'.json';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}
function wireHold(btn,cb){
  let timer=null;
  const fill=btn.querySelector('.hold-fill');
  const start=e=>{
    e.preventDefault();
    fill.style.transition='width 1.2s linear';fill.style.width='100%';
    timer=setTimeout(()=>{reset();cb();},1200);
  };
  const reset=()=>{clearTimeout(timer);timer=null;fill.style.transition='width .2s';fill.style.width='0';};
  btn.addEventListener('pointerdown',start);
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>btn.addEventListener(ev,reset));
}

/* ================= editor ================= */
function newScenario(){return{id:uid(),created:Date.now(),name:'',instruction:'',bg:{type:'preset',value:'plain'},zones:[],items:[]};}
function openEditor(sc){
  state.draft=JSON.parse(JSON.stringify(sc||newScenario()));
  state.selZone=null;
  renderEditor();
  show('scr-editor');
}
function renderEditor(){
  const el=$('#scr-editor'),d=state.draft;
  el.innerHTML=`<div class="ed-wrap">
    <header class="ed-head">
      <button class="btn btn-ghost" id="ed-back">‹ Zpět</button>
      <h2>Scénář</h2><span class="spacer"></span>
      <button class="btn btn-sm" id="ed-test">▶ Vyzkoušet</button>
      <button class="btn btn-save" id="ed-save">💾 Uložit</button>
    </header>
    <section class="ed-sec">
      <label>Název scénáře
        <input id="ed-name" placeholder="Např. Zelenina na talíř" value="${esc(d.name)}"></label>
      <label>Zadání pro dítě <span class="hint">(přečte se nahlas)</span>
        <div class="row">
          <input id="ed-instr" style="flex:1" placeholder="Např. Vyber všechnu zeleninu a dej ji na talíř." value="${esc(d.instruction)}">
          <button class="btn btn-sm" id="ed-say" title="Přečíst">🔊</button>
        </div></label>
    </section>

      <h3>1) Pozadí</h3>

      </div>
    </section>
    <section class="ed-sec">
      <h3>2) Cílové zóny <span class="hint">— zónu přetáhneš prstem, fialovým rohem změníš velikost</span></h3>
      <button class="btn btn-sm" id="ed-addzone">＋ Přidat zónu</button>
      <div id="ed-stage"></div>
      <div id="ed-zonepanel"></div>
    </section>
    <section class="ed-sec">
      <h3>3) Obrázky <span class="hint">— u každého vyber, kam patří</span></h3>
      <div class="row">
        <label class="btn btn-sm" style="margin:0">📷 Nahrát fotky<input type="file" accept="image/*" multiple id="ed-photos" hidden></label>
        <input id="ed-emoji" placeholder="Napiš emoji: 🥕🍅🥦…">
        <button class="btn btn-sm" id="ed-addemoji">＋ Přidat emoji</button>
      </div>
      <div class="row" style="margin-top:10px">
        <input id="ed-pict" placeholder="Hledat obrázek: mrkev, pes, jablko…">
        <button class="btn btn-sm" id="ed-pictbtn">🔍 Hledat</button>
      </div>
      <div id="ed-pictres" class="pict-grid"></div>
      <p class="hint" style="margin:8px 0 0">Vyhledávání používá volnou knihovnu piktogramů ARASAAC (arasaac.org, licence CC BY‑NC‑SA, autor Sergio Palao, vlastník Gobierno de Aragón) a potřebuje internet. Vybrané obrázky se uloží do scénáře a pak fungují i bez připojení.</p>
      <div id="ed-items" class="item-grid"></div>
    </section>
  </div>`;

  $('#ed-name').oninput=e=>d.name=e.target.value;
  $('#ed-instr').oninput=e=>d.instruction=e.target.value;
  $('#ed-say').onclick=()=>speak(d.instruction||d.name);
  el.querySelectorAll('.bg-swatch[data-bg]').forEach(b=>b.onclick=()=>{
    d.bg={type:'preset',value:b.dataset.bg};edMarkBg();edRenderStage();
  });
  $('#ed-bgfile').onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    d.bg={type:'photo',value:await fileToDataURL(f,1400)};
    e.target.value='';edMarkBg();edRenderStage();
  };
  $('#ed-addzone').onclick=()=>{
    const z={id:uid(),name:'Zóna '+(d.zones.length+1),emoji:'',x:.35,y:.35,w:.3,h:.3};
    d.zones.push(z);state.selZone=z.id;
    edRenderStage();edRenderZonePanel();edRenderItems();
  };
  $('#ed-photos').onchange=async e=>{
    for(const f of e.target.files){
      d.items.push({id:uid(),type:'photo',value:await fileToDataURL(f,480),zoneId:(d.zones[0]||{}).id||null});
    }
    e.target.value='';edRenderItems();
  };
  $('#ed-addemoji').onclick=()=>{
    const inp=$('#ed-emoji'),s=inp.value.trim();if(!s)return;
    let parts;
    if(window.Intl&&Intl.Segmenter){
      parts=[...new Intl.Segmenter('cs',{granularity:'grapheme'}).segment(s)].map(x=>x.segment);
    }else{parts=[...s];}
    parts.filter(p=>p.trim()).forEach(p=>d.items.push({id:uid(),type:'emoji',value:p,zoneId:(d.zones[0]||{}).id||null}));
    inp.value='';edRenderItems();
  };
  $('#ed-pictbtn').onclick=searchPict;
  $('#ed-pict').addEventListener('keydown',e=>{if(e.key==='Enter')searchPict();});
  $('#ed-test').onclick=()=>{
    if(!d.zones.length||!d.items.some(i=>i.zoneId)){alert('Přidej aspoň jednu zónu a jeden obrázek, který do ní patří.');return;}
    startGame(d,'editor');
  };
  $('#ed-save').onclick=async()=>{
    if(!d.name.trim())d.name='Bez názvu';
    if(!d.zones.length){alert('Přidej aspoň jednu cílovou zónu.');return;}
    if(!d.items.some(i=>i.zoneId)){alert('Aspoň jeden obrázek musí patřit do nějaké zóny.');return;}
    await DB.put('scenarios',JSON.parse(JSON.stringify(d)));
    const i=state.scenarios.findIndex(s=>s.id===d.id);
    if(i>=0)state.scenarios[i]=d;else state.scenarios.push(d);
    renderHome();show('scr-home');
  };
  $('#ed-back').onclick=()=>{
    if(confirm('Odejít bez uložení změn?')){renderHome();show('scr-home');}
  };

  edMarkBg();edRenderStage();edRenderZonePanel();edRenderItems();
}
function edMarkBg(){
  const d=state.draft;
  document.querySelectorAll('.bg-swatch[data-bg]').forEach(b=>
    b.classList.toggle('sel',d.bg.type==='preset'&&d.bg.value===b.dataset.bg));
  const up=document.querySelector('.bg-upload');
  if(up)up.classList.toggle('sel',d.bg.type==='photo');
}
function edRenderStage(){
  const stage=$('#ed-stage'),d=state.draft;
  stage.style.cssText=bgStyle(d.bg);
  stage.innerHTML='';
  if(!d.zones.length){stage.innerHTML='<div class="stage-hint">Přidej zónu tlačítkem výše</div>';return;}
  d.zones.forEach(z=>{
    const zel=document.createElement('div');
    zel.className='zone'+(state.selZone===z.id?' sel':'');
    posZone(zel,z);
    zel.innerHTML=`<div class="z-emoji">${z.emoji||''}</div><div class="z-label">${esc(z.name)}</div><div class="z-handle"></div>`;
    wireZoneEdit(zel,z);
    stage.appendChild(zel);
  });
}
function wireZoneEdit(zel,z){
  const stage=$('#ed-stage');
  zel.addEventListener('pointerdown',e=>{
    if(e.target.classList.contains('z-handle'))return;
    e.preventDefault();
    state.selZone=z.id;
    document.querySelectorAll('#ed-stage .zone').forEach(q=>q.classList.toggle('sel',q===zel));
    edRenderZonePanel();
    const r=stage.getBoundingClientRect(),sx=e.clientX,sy=e.clientY,ox=z.x,oy=z.y;
    zel.setPointerCapture(e.pointerId);
    const mv=ev=>{
      z.x=clamp(ox+(ev.clientX-sx)/r.width,0,1-z.w);
      z.y=clamp(oy+(ev.clientY-sy)/r.height,0,1-z.h);
      posZone(zel,z);
    };
    const up=()=>['pointermove','pointerup','pointercancel'].forEach((n,i)=>zel.removeEventListener(n,[mv,up,up][i]));
    zel.addEventListener('pointermove',mv);
    zel.addEventListener('pointerup',up);
    zel.addEventListener('pointercancel',up);
  });
  const h=zel.querySelector('.z-handle');
  h.addEventListener('pointerdown',e=>{
    e.preventDefault();e.stopPropagation();
    const r=stage.getBoundingClientRect(),sx=e.clientX,sy=e.clientY,ow=z.w,oh=z.h;
    h.setPointerCapture(e.pointerId);
    const mv=ev=>{
      z.w=clamp(ow+(ev.clientX-sx)/r.width,.12,1-z.x);
      z.h=clamp(oh+(ev.clientY-sy)/r.height,.12,1-z.y);
      posZone(zel,z);
    };
    const up=()=>['pointermove','pointerup','pointercancel'].forEach((n,i)=>h.removeEventListener(n,[mv,up,up][i]));
    h.addEventListener('pointermove',mv);
    h.addEventListener('pointerup',up);
    h.addEventListener('pointercancel',up);
  });
}
function edRenderZonePanel(){
  const p=$('#ed-zonepanel'),d=state.draft;
  const z=d.zones.find(z=>z.id===state.selZone);
  if(!z){p.innerHTML='';return;}
  p.innerHTML=`<div class="zone-panel">
    <label>Název zóny<input id="zp-name" value="${esc(z.name)}"></label>
    <label>Emoji zóny <span class="hint">(nepovinné)</span><input id="zp-emoji" value="${esc(z.emoji||'')}" placeholder="🍽️"></label>
    <button class="btn btn-sm danger" id="zp-del">🗑 Smazat zónu</button>
  </div>`;
  $('#zp-name').oninput=e=>{z.name=e.target.value;edRenderStage();edRenderItems();};
  $('#zp-emoji').oninput=e=>{z.emoji=e.target.value;edRenderStage();};
  $('#zp-del').onclick=()=>{
    d.zones=d.zones.filter(q=>q.id!==z.id);
    d.items.forEach(i=>{if(i.zoneId===z.id)i.zoneId=null;});
    state.selZone=null;
    edRenderStage();edRenderZonePanel();edRenderItems();
  };
}
function edRenderItems(){
  const grid=$('#ed-items'),d=state.draft;
  grid.innerHTML=d.items.map(it=>`
    <div class="item-card">
      <div class="item-vis">${itemVis(it)}</div>
      <select data-zone="${it.id}">
        <option value="">🚫 Nikam (navíc)</option>
        ${d.zones.map(z=>`<option value="${z.id}"${it.zoneId===z.id?' selected':''}>➜ ${esc(z.name)}</option>`).join('')}
      </select>
      <button class="item-del" data-delitem="${it.id}">✕</button>
    </div>`).join('')||'<p class="empty">Zatím žádné obrázky — nahraj fotky nebo přidej emoji.</p>';
  grid.querySelectorAll('[data-zone]').forEach(s=>s.onchange=()=>{
    d.items.find(i=>i.id===s.dataset.zone).zoneId=s.value||null;
  });
  grid.querySelectorAll('[data-delitem]').forEach(b=>b.onclick=()=>{
    d.items=d.items.filter(i=>i.id!==b.dataset.delitem);edRenderItems();
  });
}

/* ---- ARASAAC pictogram search ---- */
async function searchPict(){
  const q=$('#ed-pict').value.trim();if(!q)return;
  const res=$('#ed-pictres');
  res.innerHTML='<p class="hint">Hledám…</p>';
  try{
    const r=await fetch('https://api.arasaac.org/api/pictograms/cs/search/'+encodeURIComponent(q));
    if(!r.ok)throw new Error(r.status);
    const arr=await r.json();
    if(!arr.length){res.innerHTML='<p class="hint">Nic nenalezeno — zkus jiné slovo.</p>';return;}
    res.innerHTML=arr.slice(0,12).map(p=>
      `<button class="pict-thumb" data-pict="${p._id}" title="Ťukni pro přidání">
        <img src="https://static.arasaac.org/pictograms/${p._id}/${p._id}_300.png" loading="lazy" alt="">
      </button>`).join('');
    res.querySelectorAll('[data-pict]').forEach(b=>b.onclick=()=>addPict(b));
  }catch(e){
    res.innerHTML='<p class="hint">Hledání se nepovedlo — je zařízení připojené k internetu?</p>';
  }
}
async function addPict(btn){
  btn.disabled=true;btn.style.opacity=.45;
  try{
    const r=await fetch(btn.querySelector('img').src);
    const blob=await r.blob();
    const url=await new Promise((res,rej)=>{
      const f=new FileReader();f.onload=()=>res(f.result);f.onerror=rej;f.readAsDataURL(blob);
    });
    state.draft.items.push({id:uid(),type:'photo',value:url,zoneId:(state.draft.zones[0]||{}).id||null});
    edRenderItems();
    btn.style.outline='3px solid var(--good)';
  }catch(e){
    alert('Obrázek se nepodařilo stáhnout.');
    btn.disabled=false;btn.style.opacity=1;
  }
}

/* ================= game ================= */
function startGame(sc,returnTo){
  state.gameReturn=returnTo||'home';
  state.game={sc:JSON.parse(JSON.stringify(sc)),errors:0,placed:0,
    required:sc.items.filter(i=>i.zoneId).length,
    start:Date.now(),mistakes:[]};
  renderGame();
  show('scr-game');
  speak(sc.instruction||sc.name);
}
function renderGame(){
  const el=$('#scr-game'),g=state.game,sc=g.sc;
  el.innerHTML=`
    <div class="g-top">
      <button class="btn btn-ghost" id="g-back">‹</button>
      <button class="btn-say" id="g-say">🔊</button>
      <div class="g-instr">${esc(sc.instruction||sc.name)}</div>
    </div>
    <div class="g-stage" id="g-stage" style="${bgStyle(sc.bg)}"></div>
    <div class="g-tray" id="g-tray"></div>
    <div class="g-over" id="g-over"></div>`;
  const stage=$('#g-stage');
  sc.zones.forEach(z=>{
    const zel=document.createElement('div');
    zel.className='zone';zel.dataset.zid=z.id;
    posZone(zel,z);
    zel.innerHTML=`<div class="z-emoji">${z.emoji||''}</div><div class="z-label">${esc(z.name)}</div>`;
    stage.appendChild(zel);
  });
  const tray=$('#g-tray');
  shuffle(sc.items).forEach(it=>{
    const t=document.createElement('div');
    t.className='tray-item';t.innerHTML=itemVis(it);
    tray.appendChild(t);
    wireDrag(t,it);
  });
  $('#g-say').onclick=()=>speak(sc.instruction||sc.name);
  $('#g-back').onclick=()=>{
    try{speechSynthesis.cancel();}catch(e){}
    if(state.gameReturn==='editor')show('scr-editor');
    else{renderHome();show('scr-home');}
  };
}
function wireDrag(el,item){
  el.addEventListener('pointerdown',e=>{
    if(el.classList.contains('gone'))return;
    e.preventDefault();ac();
    const ghost=document.createElement('div');
    ghost.className='drag-ghost';ghost.innerHTML=itemVis(item);
    document.body.appendChild(ghost);
    const place=(x,y)=>{ghost.style.left=(x-55)+'px';ghost.style.top=(y-55)+'px';};
    place(e.clientX,e.clientY);
    el.classList.add('gone');
    el.setPointerCapture(e.pointerId);
    const zones=[...document.querySelectorAll('#g-stage .zone')];
    const zoneAt=(x,y)=>{
      for(const zel of zones){
        const r=zel.getBoundingClientRect();
        if(x>r.left-24&&x<r.right+24&&y>r.top-24&&y<r.bottom+24)return zel;
      }
      return null;
    };
    let hot=null;
    const mv=ev=>{
      place(ev.clientX,ev.clientY);
      const h=zoneAt(ev.clientX,ev.clientY);
      if(h!==hot){if(hot)hot.classList.remove('hot');hot=h;if(hot)hot.classList.add('hot');}
    };
    const done=()=>['pointermove','pointerup','pointercancel'].forEach((n,i)=>el.removeEventListener(n,[mv,up,cancel][i]));
    const up=ev=>{
      done();
      if(hot)hot.classList.remove('hot');
      const zel=zoneAt(ev.clientX,ev.clientY);
      if(zel&&item.zoneId===zel.dataset.zid)dropCorrect(ghost,zel,item,el,ev);
      else if(zel)dropWrong(ghost,el,item);
      else flyBack(ghost,el,false);
    };
    const cancel=()=>{done();if(hot)hot.classList.remove('hot');flyBack(ghost,el,false);};
    el.addEventListener('pointermove',mv);
    el.addEventListener('pointerup',up);
    el.addEventListener('pointercancel',cancel);
  });
}
function dropCorrect(ghost,zel,item,trayEl,ev){
  sndGood();
  const zr=zel.getBoundingClientRect();
  const size=Math.max(40,Math.min(76,zr.width*.35,zr.height*.55));
  const p=document.createElement('div');
  p.className='placed';
  p.style.width=p.style.height=size+'px';
  p.style.fontSize=size*.78+'px';
  p.innerHTML=itemVis(item);
  p.style.left=clamp(ev.clientX-zr.left-size/2,4,zr.width-size-4)+'px';
  p.style.top=clamp(ev.clientY-zr.top-size/2,4,zr.height-size-4)+'px';
  zel.appendChild(p);
  sparkle(ev.clientX,ev.clientY);
  ghost.remove();trayEl.remove();
  const g=state.game;
  g.placed++;
  if(g.placed>=g.required)setTimeout(win,500);
}
function dropWrong(ghost,el,item){
  const g=state.game;
  g.errors++;
  g.mistakes.push(item.type==='emoji'?item.value:'📷');
  sndBad();
  flyBack(ghost,el,true);
}
function flyBack(ghost,el,shake){
  const r=el.getBoundingClientRect();
  requestAnimationFrame(()=>{
    ghost.style.transition='left .3s ease,top .3s ease,transform .3s';
    ghost.style.left=(r.left+r.width/2-55)+'px';
    ghost.style.top=(r.top+r.height/2-55)+'px';
    ghost.style.transform='scale(.85)';
  });
  setTimeout(()=>{
    ghost.remove();
    el.classList.remove('gone');
    if(shake){el.classList.add('shake');setTimeout(()=>el.classList.remove('shake'),480);}
  },330);
}
function sparkle(x,y){
  for(let i=0;i<6;i++){
    const s=document.createElement('div');
    s.className='spark';s.textContent='✨';
    s.style.left=x+'px';s.style.top=y+'px';
    s.style.setProperty('--dx',(Math.random()*140-70)+'px');
    s.style.setProperty('--dy',(Math.random()*-100-20)+'px');
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),720);
  }
}
function win(){
  sndWin();speak('Výborně!');
  const g=state.game;
  const stars=g.errors===0?3:g.errors<=2?2:1;
  if(state.gameReturn==='home'){
    DB.put('results',{
      id:uid(),ts:Date.now(),
      scenarioId:g.sc.id,scenarioName:g.sc.name,
      stars,errors:g.errors,mistakes:g.mistakes,
      duration:Math.round((Date.now()-g.start)/1000),
    }).catch(()=>{});
  }
  const over=$('#g-over');
  over.innerHTML=`<div class="win-card">
    <div class="win-emo">🎉</div>
    <h2>Výborně!</h2>
    <div class="win-stars">${'⭐'.repeat(stars)}${'<span class="dim">⭐</span>'.repeat(3-stars)}</div>
    <div class="row center">
      <button class="btn btn-play" id="w-again">🔁 Ještě jednou</button>
      <button class="btn btn-ghost" id="w-home">🏠 Domů</button>
    </div>
  </div>`;
  const EMO=['🎉','⭐','✨','🎈'];
  for(let i=0;i<22;i++){
    const c=document.createElement('div');
    c.className='conf';c.textContent=EMO[i%EMO.length];
    c.style.left=Math.random()*100+'vw';
    c.style.animationDelay=(Math.random()*.9)+'s';
    over.appendChild(c);
  }
  over.classList.add('show');
  $('#w-again').onclick=()=>startGame(g.sc,state.gameReturn);
  $('#w-home').onclick=()=>{
    if(state.gameReturn==='editor')show('scr-editor');
    else{renderHome();show('scr-home');}
  };
}

/* ================= results ================= */
async function renderResults(){
  const el=$('#scr-results');
  const rows=(await DB.getAll('results')).sort((a,b)=>b.ts-a.ts);
  const fmt=ts=>new Date(ts).toLocaleString('cs-CZ',{day:'numeric',month:'numeric',hour:'2-digit',minute:'2-digit'});
  const dur=s=>s>=60?Math.floor(s/60)+' min '+(s%60)+' s':s+' s';
  el.innerHTML=`<div class="home-wrap">
    <header class="ed-head">
      <button class="btn btn-ghost" id="res-back">‹ Zpět</button>
      <h2>📊 Výsledky</h2><span class="spacer"></span>
      ${rows.length?'<button class="btn btn-sm danger" id="res-clear">🗑 Vymazat vše</button>':''}
    </header>
    ${rows.length?rows.map(r=>`<div class="res-card">
      <div class="res-when">${fmt(r.ts)}</div>
      <div class="res-name">${esc(r.scenarioName)}</div>
      <div class="res-stars">${'⭐'.repeat(r.stars)}</div>
      <div class="res-info">${r.errors===0?'bez chyby':r.errors+'× chybný pokus'+(r.mistakes&&r.mistakes.length?' ('+r.mistakes.map(esc).join(' ')+')':'')} · ${dur(r.duration||0)}</div>
    </div>`).join(''):'<p class="empty">Zatím žádné odehrané úlohy.</p>'}
  </div>`;
  $('#res-back').onclick=()=>{renderHome();show('scr-home');};
  const clr=$('#res-clear');
  if(clr)clr.onclick=async()=>{
    if(confirm('Opravdu vymazat všechny výsledky?')){await DB.clear('results');renderResults();}
  };
  show('scr-results');
}

/* ================= init ================= */
(async function init(){
  await DB.open();
  state.scenarios=await DB.getAll('scenarios');
  if(!state.scenarios.length&&!localStorage.getItem('prirazovacka-seeded')){
    for(const s of demoScenarios())await DB.put('scenarios',s);
    localStorage.setItem('prirazovacka-seeded','1');
    state.scenarios=await DB.getAll('scenarios');
  }
  renderHome();
  show('scr-home');
})();
